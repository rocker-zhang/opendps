name: CI

on:
  push:
    branches: [main, "release/*"]
  pull_request:
    branches: [main]

jobs:
  security:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  python:
    needs: security
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e ".[dev,sim,cvxpy,operator]" -q
      - name: Lint
        run: . .venv/bin/activate && ruff check src/ tests/
      - name: Test
        run: . .venv/bin/activate && pytest tests/ -x -q --tb=short

  rust:
    needs: security
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace -- -D warnings
      - name: test
        run: cargo test --workspace

  docker:
    needs: security
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build controller image
        run: docker build -f deploy/controller.Dockerfile -t opendps-controller:ci .
      - name: Build agent image
        run: docker build -f deploy/agent-rust.Dockerfile -t opendps-agent-rust:ci .

  audit:
    name: Dependency audit
    needs: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pip-audit -q
      - run: pip-audit --requirement <(pip install -e ".[sim]" -q && pip freeze) --ignore-vuln PYSEC-2022-42974 || true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --quiet
      - run: cargo audit
