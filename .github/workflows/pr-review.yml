name: PR Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    name: Automated review
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        run: git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr.diff

      - name: Run review
        env:
          AI_REVIEW_KEY: ${{ secrets.AI_REVIEW_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
          REPO: ${{ github.repository }}
        run: |
          pip install anthropic -q

          python3 - << 'PYEOF'
          import anthropic, os, sys, subprocess, textwrap

          diff = open("/tmp/pr.diff").read()
          if not diff.strip():
              print("Empty diff, skip.")
              sys.exit(0)
          if len(diff) > 80000:
              diff = diff[:80000] + "\n\n... [truncated]"

          key = os.environ.get("AI_REVIEW_KEY", "")
          if not key:
              print("No review key, skip.")
              sys.exit(0)

          client = anthropic.Anthropic(api_key=key)
          prompt = textwrap.dedent(f"""
          Review this pull request for the opendps project (GPU power management stack).

          Focus only on concrete issues in these categories:
          1. **Security** — hardcoded credentials, internal hostnames, employer names, private IPs
          2. **Correctness** — power values must be in watts not milliwatts; threshold bugs; off-by-one
          3. **Tests** — new brain algorithms need unit tests; new Actuator methods need tests
          4. **Rust safety** — new `unsafe` blocks must have a `// SAFETY:` comment

          For each issue: file, line range, what's wrong, how to fix. Skip style/formatting nits.
          If nothing is found, say "No issues found."
          End with one line: `Verdict: APPROVE` or `Verdict: REQUEST_CHANGES`.
          Keep response under 350 words.

          Diff:
          ```diff
          {diff}
          ```
          """).strip()

          resp = client.messages.create(
              model="claude-sonnet-4-6",
              max_tokens=1024,
              messages=[{"role": "user", "content": prompt}],
          )
          body = "## Automated review\n\n" + resp.content[0].text
          subprocess.run([
              "gh", "pr", "comment", os.environ["PR_NUMBER"],
              "--repo", os.environ["REPO"], "--body", body,
          ], check=True)
          print("Review posted.")
          PYEOF
