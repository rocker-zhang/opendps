apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: powerpolicies.opendps.io
spec:
  group: opendps.io
  names:
    kind: PowerPolicy
    plural: powerpolicies
    singular: powerpolicy
    shortNames: ["pp"]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [domainRef, brain]
              properties:
                domainRef:
                  type: string
                  description: "Name of the PowerDomain this policy applies to"
                brain:
                  type: string
                  enum: [dpm, prs, cvxpy, job-prs, quota-prs]
                  description: "Brain algorithm"
                intervalSeconds:
                  type: number
                  default: 5.0
                cvxpyTimeoutSeconds:
                  type: number
                  default: 10.0
                # N5 — failsafe hardening + transient smoothing knobs.
                capRaiseRateWattsPerTick:
                  type: number
                  default: 50.0
                  description: "Max watts a per-GPU cap may rise per tick (raise-rate limiter; 0 = unlimited)"
                ewmaAlpha:
                  type: number
                  default: 0.3
                  description: "EWMA smoothing factor for PRS draw tracking (0<a<=1; lower = smoother)"
                failsafeThresholdWatts:
                  type: number
                  description: "Per-GPU draw above which the failsafe trips (omit to disable)"
                failsafeEmergencyCapWatts:
                  type: number
                  description: "Cap applied by the failsafe on trip (W)"
            status:
              type: object
              properties:
                active:
                  type: boolean
                lastDecisionTs:
                  type: string
      subresources:
        status: {}
