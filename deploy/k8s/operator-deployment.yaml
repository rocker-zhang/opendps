apiVersion: apps/v1
kind: Deployment
metadata:
  name: opendps-operator
  namespace: opendps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opendps-operator
  template:
    metadata:
      labels:
        app: opendps-operator
    spec:
      serviceAccountName: opendps-operator
      containers:
        - name: operator
          image: opendps-operator:latest
          # Image is side-loaded into the cluster (kind load / nerdctl). With the
          # default ":latest" pull policy of Always, the kubelet would try a
          # registry pull and fail (ErrImagePull). Use the local image as-is.
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "opendps.operator"]
          env:
            - name: OPENDPS_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: opendps-operator
  namespace: opendps
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: opendps-operator
rules:
  - apiGroups: ["opendps.io"]
    resources: ["powerdomains", "powerpolicies", "jobpowerpolicies"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["opendps.io"]
    resources: ["powerdomains/status", "powerpolicies/status", "jobpowerpolicies/status"]
    verbs: ["update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # kopf posts Kubernetes Events for handler progress/errors.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["create", "patch"]
  # JobPowerPolicy reconciliation lists pods to count matches (N6).
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # NOTE: no coordination.k8s.io/leases — the operator runs with
  # settings.peering.standalone = True, so it never creates KopfPeering leases.
  # Add a leases rule only if peering is re-enabled.
  # kopf lists CRDs at startup to discover the resources it handles.
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: opendps-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: opendps-operator
subjects:
  - kind: ServiceAccount
    name: opendps-operator
    namespace: opendps
